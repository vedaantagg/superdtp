<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128"
     width="128"
     height="128">

<style>
.screen{
    animation:float 3.5s ease-in-out infinite;
    transform-origin:center;
}

.play{
    animation:pulse 2s ease-in-out infinite;
    transform-origin:64px 58px;
}

.globe{
    animation:rotate 12s linear infinite;
    transform-origin:96px 96px;
}

.wave1{
    animation:wave 1.8s ease-in-out infinite;
}

.wave2{
    animation:wave 1.8s ease-in-out .3s infinite;
}

.subtitle{
    animation:blink 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-3px);}
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes wave{
    0%,100%{opacity:.4;}
    50%{opacity:1;}
}

@keyframes blink{
    0%,90%,100%{opacity:1;}
    95%{opacity:.4;}
}
</style>

<!-- Screen -->
<g class="screen">

<rect x="18"
      y="22"
      width="74"
      height="58"
      rx="8"
      fill="#FFFFFF"
      stroke="#2563EB"
      stroke-width="3"/>

<!-- Play Button -->
<polygon class="play"
         points="48,42 48,60 66,51"
         fill="#2563EB"/>

<!-- Subtitle Lines -->
<line class="subtitle"
      x1="38"
      y1="68"
      x2="72"
      y2="68"
      stroke="#94A3B8"
      stroke-width="3"
      stroke-linecap="round"/>

<line class="subtitle"
      x1="44"
      y1="74"
      x2="66"
      y2="74"
      stroke="#CBD5E1"
      stroke-width="3"
      stroke-linecap="round"/>

</g>

<!-- Audio Waves -->

<path class="wave1"
      d="M102 38
         Q110 46 102 54"
      fill="none"
      stroke="#0F766E"
      stroke-width="3"
      stroke-linecap="round"/>

<path class="wave2"
      d="M108 32
         Q120 46 108 60"
      fill="none"
      stroke="#0F766E"
      stroke-width="3"
      stroke-linecap="round"/>

</svg>