<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 120 120"
     width="128"
     height="128">

<style>
.doc{
    animation:float 3s ease-in-out infinite;
    transform-origin:center;
}

.gear{
    animation:spin 6s linear infinite;
    transform-origin:22px 92px;
}

.globe{
    animation:spinSlow 12s linear infinite;
    transform-origin:82px 82px;
}

.pulse{
    animation:pulse 2s ease-in-out infinite;
    transform-origin:82px 82px;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-3px);}
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes spinSlow{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes pulse{
    0%,100%{opacity:.35;transform:scale(1);}
    50%{opacity:.1;transform:scale(1.12);}
}
</style>

<!-- Pulse -->
<circle class="pulse"
        cx="82"
        cy="82"
        r="24"
        fill="#14B8A6"/>

<!-- Document -->
<g class="doc">

<rect x="28"
      y="18"
      width="58"
      height="80"
      rx="8"
      fill="#fff"
      stroke="#2563EB"
      stroke-width="3"/>

<path d="M70 18L86 34H70Z"
      fill="#DBEAFE"/>

<line x1="40" y1="46" x2="72" y2="46"
      stroke="#2563EB"
      stroke-width="3"
      stroke-linecap="round"/>

<line x1="40" y1="58" x2="74" y2="58"
      stroke="#93C5FD"
      stroke-width="3"
      stroke-linecap="round"/>

<line x1="40" y1="70" x2="66" y2="70"
      stroke="#93C5FD"
      stroke-width="3"
      stroke-linecap="round"/>

</g>

<!-- Globe -->
<g class="globe">

<circle cx="82"
        cy="82"
        r="20"
        fill="#ECFEFF"
        stroke="#0F766E"
        stroke-width="3"/>

<ellipse cx="82"
         cy="82"
         rx="8"
         ry="20"
         fill="none"
         stroke="#0F766E"
         stroke-width="2"/>

<line x1="62"
      y1="82"
      x2="102"
      y2="82"
      stroke="#0F766E"
      stroke-width="2"/>

<path d="M66 74C72 71 92 71 98 74"
      fill="none"
      stroke="#0F766E"
      stroke-width="2"/>

<path d="M66 90C72 93 92 93 98 90"
      fill="none"
      stroke="#0F766E"
      stroke-width="2"/>

</g>

<!-- Gear -->
<g class="gear">

<circle cx="22"
        cy="92"
        r="10"
        fill="#EFF6FF"
        stroke="#2563EB"
        stroke-width="2.5"/>

<circle cx="22"
        cy="92"
        r="3"
        fill="#2563EB"/>

<g stroke="#2563EB"
   stroke-width="2.5"
   stroke-linecap="round">

<line x1="22" y1="77" x2="22" y2="81"/>
<line x1="22" y1="103" x2="22" y2="107"/>
<line x1="7" y1="92" x2="11" y2="92"/>
<line x1="33" y1="92" x2="37" y2="92"/>

<line x1="11" y1="81" x2="14" y2="84"/>
<line x1="33" y1="81" x2="30" y2="84"/>

<line x1="11" y1="103" x2="14" y2="100"/>
<line x1="33" y1="103" x2="30" y2="100"/>

</g>

</g>

</svg>