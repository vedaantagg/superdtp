<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#00000022"/>
    </filter>
  </defs>

  <g transform="translate(-70.33,-14.20) scale(0.45082)">

    <!-- Document -->
    <g filter="url(#shadow)">
      <rect x="260" y="100" width="280" height="300" rx="18" fill="#fff"/>

      <!-- Header -->
      <rect x="285" y="125" width="170" height="14" rx="7" fill="#81b7ff"/>

      <!-- Text -->
      <rect x="285" y="160" width="180" height="8" rx="4" fill="#8c939c"/>
      <rect x="285" y="178" width="150" height="8" rx="4" fill="#8c939c"/>
      <rect x="285" y="196" width="170" height="8" rx="4" fill="#8c939c"/>

      <!-- Image -->
      <rect x="285" y="225" width="95" height="70" rx="10" fill="#75b6e2"/>

      <!-- Text block -->
      <rect x="395" y="230" width="110" height="8" rx="4" fill="#8c939c"/>
      <rect x="395" y="248" width="95" height="8" rx="4" fill="#8c939c"/>
      <rect x="395" y="266" width="110" height="8" rx="4" fill="#8c939c"/>

      <!-- Bottom text -->
      <rect x="285" y="325" width="220" height="8" rx="4" fill="#8c939c"/>
      <rect x="285" y="343" width="180" height="8" rx="4" fill="#8c939c"/>

      <!-- Blinking Cursor -->
      <rect x="470" y="342" width="2" height="10" fill="#2563EB">
        <animate attributeName="opacity"
                 values="1;0;1"
                 dur="1s"
                 repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Language Bubble -->
    <g>
      <circle cx="180" cy="180" r="24" fill="url(#g)">
        <animateTransform attributeName="transform"
                          type="translate"
                          values="0 0;0 -8;0 0"
                          dur="3s"
                          repeatCount="indefinite"/>
      </circle>
      <text x="180" y="186"
            text-anchor="middle"
            font-family="Arial"
            font-size="13"
            font-weight="700"
            fill="#fff">EN</text>
    </g>

    <g>
      <circle cx="620" cy="170" r="24" fill="#06B6D4">
        <animateTransform attributeName="transform"
                          type="translate"
                          values="0 0;0 8;0 0"
                          dur="3.4s"
                          repeatCount="indefinite"/>
      </circle>
      <text x="620" y="176"
            text-anchor="middle"
            font-family="Arial"
            font-size="12"
            font-weight="700"
            fill="#fff">中文</text>
    </g>

    <g>
      <circle cx="180" cy="340" r="24" fill="#4F46E5">
        <animateTransform attributeName="transform"
                          type="translate"
                          values="0 0;0 -6;0 0"
                          dur="2.8s"
                          repeatCount="indefinite"/>
      </circle>
      <text x="180" y="346"
            text-anchor="middle"
            font-family="Arial"
            font-size="12"
            font-weight="700"
            fill="#fff">الع</text>
    </g>

    <g>
      <circle cx="620" cy="330" r="24" fill="#2563EB">
        <animateTransform attributeName="transform"
                          type="translate"
                          values="0 0;0 7;0 0"
                          dur="3.2s"
                          repeatCount="indefinite"/>
      </circle>
      <text x="620" y="336"
            text-anchor="middle"
            font-family="Arial"
            font-size="11"
            font-weight="700"
            fill="#fff">ES</text>
    </g>

    <!-- Connection Lines -->
    <g stroke="#93C5FD" stroke-width="2" fill="none">
      <line x1="205" y1="180" x2="260" y2="180"/>
      <line x1="540" y1="170" x2="595" y2="170"/>
      <line x1="205" y1="340" x2="260" y2="340"/>
      <line x1="540" y1="330" x2="595" y2="330"/>
    </g>

    <!-- Moving Translation Dots -->
    <g fill="#2563EB">
      <circle r="3">
        <animateMotion dur="2s" repeatCount="indefinite"
          path="M205 180 L260 180"/>
      </circle>

      <circle r="3">
        <animateMotion dur="2.2s" repeatCount="indefinite"
          path="M595 170 L540 170"/>
      </circle>

      <circle r="3">
        <animateMotion dur="2s" repeatCount="indefinite"
          path="M205 340 L260 340"/>
      </circle>

      <circle r="3">
        <animateMotion dur="2.4s" repeatCount="indefinite"
          path="M595 330 L540 330"/>
      </circle>
    </g>

    <!-- Typography Icon -->
    <g transform="translate(400 435)">
      <circle r="16" fill="#DBEAFE"/>
      <text x="0" y="5"
            text-anchor="middle"
            font-family="Arial"
            font-size="16"
            font-weight="700"
            fill="#2563EB">A</text>

      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0 400 435"
                        to="360 400 435"
                        dur="8s"
                        repeatCount="indefinite"/>
    </g>

  </g>
</svg>
