<svg width="1200" height="735" viewBox="0 0 1200 735"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- BACKGROUND -->

<radialGradient id="bg"
cx="50%"
cy="48%"
r="75%">

<stop offset="0%"
stop-color="#211E14"/>

<stop offset="48%"
stop-color="#10110F"/>

<stop offset="100%"
stop-color="#070808"/>

</radialGradient>


<!-- CENTRAL HUB -->

<radialGradient id="hub">

<stop offset="0%"
stop-color="#292518"/>

<stop offset="75%"
stop-color="#111210"/>

<stop offset="100%"
stop-color="#090A09"/>

</radialGradient>


<!-- ICON BACKGROUND -->

<linearGradient id="iconCard"
x1="0"
y1="0"
x2="1"
y2="1">

<stop offset="0%"
stop-color="#24231D"/>

<stop offset="100%"
stop-color="#111210"/>

</linearGradient>


<!-- GOLD -->

<linearGradient id="gold"
x1="0"
y1="0"
x2="1"
y2="1">

<stop offset="0%"
stop-color="#E0C569"/>

<stop offset="100%"
stop-color="#8B6D25"/>

</linearGradient>


<!-- GLOW -->

<filter id="goldGlow">

<feGaussianBlur
stdDeviation="5"
result="blur"/>

<feMerge>

<feMergeNode
in="blur"/>

<feMergeNode
in="SourceGraphic"/>

</feMerge>

</filter>


<!-- SHADOW -->

<filter id="shadow">

<feDropShadow
dx="0"
dy="10"
stdDeviation="12"
flood-color="#000"
flood-opacity=".7"/>

</filter>


<!-- GRID -->

<pattern id="grid"
width="40"
height="40"
patternUnits="userSpaceOnUse">

<path
d="M40 0H0V40"

fill="none"

stroke="#FFFFFF"

stroke-opacity=".018"/>

</pattern>


<!-- FLOW ANIMATION -->

<style>

.connector{

stroke-dasharray:5 9;

animation:flow 8s linear infinite;

}

@keyframes flow{

to{

stroke-dashoffset:-120;

}

}


.orbit{

transform-origin:center;

animation:rotate 80s linear infinite;

}

@keyframes rotate{

to{

transform:rotate(360deg);

}

}


.pulse{

animation:pulse 3s ease-in-out infinite;

}

@keyframes pulse{

0%,100%{

opacity:.35;

}

50%{

opacity:.8;

}

}


.float{

animation:float 4s ease-in-out infinite;

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-5px);

}

}

</style>

</defs>



