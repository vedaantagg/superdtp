<?xml version="1.0" encoding="UTF-8"?>
<!-- Wordmark and .com are outlined Impact glyphs, not live <text>. Impact is
     absent on phones/most non-Windows devices; the wider fallback font used to
     overrun the rotated ".com" column. Paths render identically everywhere.
     Regenerate with scratchpad/build_logo.py if the wordmark ever changes. -->
