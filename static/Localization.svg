<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 620" width="1450" height="620" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="rgba(255,255,255,0.45)" style="filter:url(#glow)" />
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d4af37" style="filter:url(#glow)" />
    </marker>

    <radialGradient id="hubGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f6dd94" />
      <stop offset="55%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#93700f" />
    </radialGradient>

    <radialGradient id="bgGlowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.18)" />
      <stop offset="100%" stop-color="rgba(212,175,55,0)" />
    </radialGradient>
    <radialGradient id="bgGlowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.14)" />
      <stop offset="100%" stop-color="rgba(56,189,248,0)" />
    </radialGradient>

    <pattern id="gridPattern" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1" />
    </pattern>

    <style>
      .src-card   { fill:rgba(255,255,255,0.035); stroke:rgba(255,255,255,0.12); stroke-width:1.5; }
      .src-title  { fill:rgba(255,255,255,0.94); font-size:15px; font-weight:700; }
      .src-sub    { fill:rgba(255,255,255,0.5); font-size:11.5px; }
      .icon-line  { fill:none; stroke:#d4af37; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

      .step-title { fill:rgba(255,255,255,0.96); font-size:14.5px; font-weight:700; }
      .step-sub   { fill:rgba(255,255,255,0.55); font-size:11px; }
      .badge-txt  { fill:#09090b; font-size:13px; font-weight:800; }

      .hub-title  { fill:#09090b; font-size:16px; font-weight:800; }
      .hub-sub    { fill:rgba(9,9,11,0.7); font-size:11.5px; font-weight:600; }

      .out-title  { fill:rgba(255,255,255,0.95); font-size:15px; font-weight:800; }
      .lang-chip  { fill:rgba(255,255,255,0.04); stroke:rgba(212,175,55,0.4); stroke-width:1; }
      .lang-txt   { fill:#d4af37; font-size:10.5px; font-weight:600; }

      .flow-line  { fill:none; stroke:rgba(255,255,255,0.28); stroke-width:1.8; stroke-dasharray:6 8; }
      .flow-anim  { fill:none; stroke:#d4af37; stroke-width:2.4; stroke-dasharray:6 8; filter:url(#glow); }

      @keyframes dashMove {
        to { stroke-dashoffset: -28; }
      }
      .flow-anim, .flow-line { animation: dashMove 1.4s linear infinite; }

      @keyframes pulse {
        0%,100% { r:66; opacity:0.6; }
        50%     { r:78; opacity:0; }
      }
      .hub-pulse { fill:none; stroke:#d4af37; stroke-width:2; animation: pulse 2.6s ease-out infinite; }

      @keyframes softFloat {
        0%,100% { transform: translateY(0px); }
        50%     { transform: translateY(-4px); }
      }
      .float { animation: softFloat 3.4s ease-in-out infinite; }

      @keyframes fadeIn {
        from { opacity:0; }
        to   { opacity:1; }
      }
      .card-group { animation: fadeIn 0.6s ease-out both; }

      @keyframes glowPulse {
        0%,100% { opacity:0.75; }
        50%     { opacity:1; }
      }
      .glow-pulse { animation: glowPulse 2.8s ease-in-out infinite; }
    </style>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur" /><feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs>

  
  <rect x="0" y="0" width="1450" height="620" fill="#09090b" />
 
  <rect x="0" y="0" width="700" height="620" fill="url(#bgGlowGold)" />
  <rect x="900" y="0" width="550" height="620" fill="url(#bgGlowCyan)" />

  
  <g>
    <path class="flow-line" d="M 220 80  Q 300 80 300 150 L 300 234" marker-end="url(#arrow)" />
    <path class="flow-line" d="M 220 190 Q 280 190 300 234" marker-end="url(#arrow)" />
    <path class="flow-line" d="M 220 300 L 279 300" marker-end="url(#arrow)" />
    <path class="flow-line" d="M 220 410 Q 280 410 300 366" marker-end="url(#arrow)" />
    <path class="flow-line" d="M 220 520 Q 300 520 300 450 L 300 366" marker-end="url(#arrow)" />
  </g>

  
  <g class="card-group" style="animation-delay:0.05s">
    <rect class="src-card" x="30" y="40" width="190" height="80" rx="14" />
    <g transform="translate(52,64)">
      <rect class="icon-line" x="0" y="0" width="26" height="18" rx="2" />
      <line class="icon-line" x1="0" y1="6" x2="26" y2="6" />
    </g>
    <text class="src-title" x="52" y="98">Websites</text>
    <text class="src-sub" x="52" y="112">HTML, CMS, Web Apps</text>
  </g>

  <g class="card-group" style="animation-delay:0.12s">
    <rect class="src-card" x="30" y="150" width="190" height="80" rx="14" />
    <g transform="translate(52,174)">
      <path class="icon-line" d="M8,0 L0,9 L8,18" />
      <path class="icon-line" d="M18,0 L26,9 L18,18" />
    </g>
    <text class="src-title" x="52" y="208">Software</text>
    <text class="src-sub" x="52" y="222">Strings, JSON, XML</text>
  </g>

  <g class="card-group" style="animation-delay:0.19s">
    <rect class="src-card" x="30" y="260" width="190" height="80" rx="14" />
    <g transform="translate(58,270)">
      <rect class="icon-line" x="0" y="0" width="16" height="26" rx="3" />
      <line class="icon-line" x1="6" y1="22" x2="10" y2="22" />
    </g>
    <text class="src-title" x="52" y="318">Mobile Apps</text>
    <text class="src-sub" x="52" y="332">iOS &amp; Android Assets</text>
  </g>

  <g class="card-group" style="animation-delay:0.26s">
    <rect class="src-card" x="30" y="370" width="190" height="80" rx="14" />
    <g transform="translate(56,392)">
      <path class="icon-line" d="M0,-14 L14,-14 L20,-6 L20,14 L0,14 Z" />
      <path class="icon-line" d="M14,-14 L14,-6 L20,-6" />
    </g>
    <text class="src-title" x="52" y="428">Manuals</text>
    <text class="src-sub" x="52" y="442">PDF, FrameMaker, DOCX</text>
  </g>

  <g class="card-group" style="animation-delay:0.33s">
    <rect class="src-card" x="30" y="480" width="190" height="80" rx="14" />
    <g transform="translate(56,500)">
      <path class="icon-line" d="M0,20 C0,8 8,0 20,0 C20,12 12,20 0,20 Z" />
      <line class="icon-line" x1="0" y1="20" x2="10" y2="10" />
    </g>
    <text class="src-title" x="52" y="538">ESG Reports</text>
    <text class="src-sub" x="52" y="552">Sustainability &amp; Governance</text>
  </g>

  
  <g transform="translate(300,300)">
    <circle class="hub-pulse" r="66" />
    <circle r="65" fill="url(#hubGrad)" stroke="#f6dd94" stroke-width="1.5" style="filter:url(#glow)" />
    
<g transform="translate(-25,-45) scale(0.78)">

  <g fill="none"
     stroke="black"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">
    <circle cx="32" cy="32" r="28"/>
    <line x1="5" y1="32" x2="59" y2="32"/>
    <line x1="32" y1="5" x2="32" y2="59"/>
    <path d="M20 7 C12 18 12 46 20 57"/>
    <path d="M44 7 C52 18 52 46 44 57"/>
    <path d="M10 15 C22 22 42 22 54 15"/>
    <path d="M10 49 C22 42 42 42 54 49"/>
  </g>
</g>
    <text class="hub-title" text-anchor="middle" y="24">Global Content</text>
    <text class="hub-sub" text-anchor="middle" y="40">Localization Hub</text>
  </g>

  
  <path class="flow-line" d="M 365 300 L 449 300" marker-end="url(#arrowGold)" />
  <path class="flow-anim" d="M 365 300 L 449 300" />

  <path class="flow-line" d="M 610 300 L 639 300" marker-end="url(#arrowGold)" />
  <path class="flow-anim" d="M 610 300 L 639 300" />

  <path class="flow-line" d="M 800 300 L 829 300" marker-end="url(#arrowGold)" />
  <path class="flow-anim" d="M 800 300 L 829 300" />

  <path class="flow-line" d="M 990 300 L 1019 300" marker-end="url(#arrowGold)" />
  <path class="flow-anim" d="M 990 300 L 1019 300" />

  <path class="flow-line" d="M 1180 300 L 1219 300" marker-end="url(#arrowGold)" />
  <path class="flow-anim" d="M 1180 300 L 1219 300" />

  
  <g class="card-group" style="animation-delay:0.4s">
    <rect x="450" y="255" width="160" height="90" rx="14" fill="rgba(56,189,248,0.055)" stroke="#38bdf8" stroke-width="1.5" style="filter:url(#glow)" class="glow-pulse" />
    <circle cx="466" cy="271" r="11" fill="#38bdf8" style="filter:url(#glow)" />
    <text class="badge-txt" x="466" y="275" text-anchor="middle">1</text>
    <text x="560" y="300" font-size="30px">🤖</text>
    <text class="step-title" x="466" y="300">AI Translation</text>
    <text class="step-sub" x="466" y="317">Neural Machine</text>
    <text class="step-sub" x="466" y="330">Translation</text>
  </g>

  
  <g class="card-group" style="animation-delay:0.48s">
    <rect x="640" y="255" width="160" height="90" rx="14" fill="rgba(56,189,248,0.055)" stroke="#38bdf8" stroke-width="1.5" style="filter:url(#glow)" class="glow-pulse" />
    <circle cx="656" cy="271" r="11" fill="#38bdf8" style="filter:url(#glow)" />
    <text class="badge-txt" x="656" y="275" text-anchor="middle">2</text>
    <text x="755" y="300" font-size="30px">🧑🏻‍💻</text>
    <text class="step-title" x="656" y="300">Human Review</text>
    <text class="step-sub" x="656" y="317">Native</text>
    <text class="step-sub" x="656" y="330">Translators</text>
  </g>

  
  <g class="card-group" style="animation-delay:0.56s">
    <rect x="830" y="255" width="160" height="90" rx="14" fill="rgba(52,211,153,0.06)" stroke="#34d399" stroke-width="1.5" style="filter:url(#glow)" class="glow-pulse" />
    <circle cx="846" cy="271" r="11" fill="#34d399" style="filter:url(#glow)" />
    <text class="badge-txt" x="846" y="275" text-anchor="middle">3</text>
    <text x="940" y="300" font-size="30px">✅</text>
    <text class="step-title" x="846" y="300">QA Validation</text>
    <text class="step-sub" x="846" y="317">Linguistic &amp;</text>
    <text class="step-sub" x="846" y="330">Layout QA</text>
  </g>

  
  <g class="card-group" style="animation-delay:0.64s">
    <rect x="1020" y="255" width="160" height="90" rx="14" fill="rgba(212,175,55,0.07)" stroke="#d4af37" stroke-width="1.5" style="filter:url(#glow)" class="glow-pulse" />
    <circle cx="1036" cy="271" r="11" fill="#d4af37" style="filter:url(#glow)" />
    <text class="badge-txt" x="1036" y="275" text-anchor="middle">4</text>
    <text x="1115" y="300" font-size="45px">📤</text>
    <text class="step-title" x="1036" y="300">Publish</text>
    <text class="step-sub" x="1036" y="317">Multi-channel</text>
    <text class="step-sub" x="1036" y="330">Delivery</text>
  </g>

  
  <g class="card-group" style="animation-delay:0.75s">
    <rect x="1220" y="210" width="200" height="200" rx="16" fill="rgba(255,255,255,0.035)" stroke="#d4af37" stroke-width="1.8" style="filter:url(#glow)" />
    <text class="out-title" x="1320" y="238" text-anchor="middle">Indian Languages</text>

    <g font-family="inherit">
      
      <rect class="lang-chip" x="1234" y="250" width="80" height="24" rx="7" />
      <text class="lang-txt" x="1274" y="266" text-anchor="middle">Hindi</text>
      <rect class="lang-chip" x="1320" y="250" width="86" height="24" rx="7" />
      <text class="lang-txt" x="1363" y="266" text-anchor="middle">Bengali</text>

      <rect class="lang-chip" x="1234" y="280" width="80" height="24" rx="7" />
      <text class="lang-txt" x="1274" y="296" text-anchor="middle">Tamil</text>
      <rect class="lang-chip" x="1320" y="280" width="86" height="24" rx="7" />
      <text class="lang-txt" x="1363" y="296" text-anchor="middle">Telugu</text>

      <rect class="lang-chip" x="1234" y="310" width="80" height="24" rx="7" />
      <text class="lang-txt" x="1274" y="326" text-anchor="middle">Marathi</text>
      <rect class="lang-chip" x="1320" y="310" width="86" height="24" rx="7" />
      <text class="lang-txt" x="1363" y="326" text-anchor="middle">Gujarati</text>

      <rect class="lang-chip" x="1234" y="340" width="80" height="24" rx="7" />
      <text class="lang-txt" x="1274" y="356" text-anchor="middle">Kannada</text>
      <rect class="lang-chip" x="1320" y="340" width="86" height="24" rx="7" />
      <text class="lang-txt" x="1363" y="356" text-anchor="middle">Malayalam</text>
      
      <rect class="lang-chip" x="1234" y="370" width="80" height="24" rx="7" />
      <text class="lang-txt" x="1274" y="386" text-anchor="middle">Odia</text>
      <rect class="lang-chip" x="1320" y="370" width="86" height="24" rx="7" />
      <text class="lang-txt" x="1363" y="386" text-anchor="middle">Punjabi</text>
      <rect class="lang-chip" x="1234" y="370" width="80" height="14" rx="6" opacity="0" />
    </g>

  </g>
</svg>
