<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Project Workflow Sequence Diagram</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-bg: #242533;
            --text-color: #e2e8f0;
            --accent-blue: #008AD2;
            --accent-orange: #F39200;
            --grid-line: #33354a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Control Panel Sidebar */
        #sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--grid-line);
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .panel-header {
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--grid-line);
        }

        .panel-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--accent-blue);
        }

        /* Controls */
        .controls {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            justify-content: space-between;
            border-bottom: 1px solid var(--grid-line);
        }

        button {
            background: #2d3047;
            border: 1px solid var(--grid-line);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            flex: 1;
            font-size: 0.85rem;
        }

        button:hover {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        button#playBtn {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
        }
        button#playBtn:hover {
            opacity: 0.9;
        }

        /* Step Tracker List */
        .step-list {
            overflow-y: auto;
            flex: 1;
            padding: 10px 20px;
            list-style: none;
            margin: 0;
        }

        .step-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid transparent;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .step-item.active {
            background: rgba(0, 138, 210, 0.15);
            border-left-color: var(--accent-blue);
            font-weight: bold;
            transform: translateX(4px);
        }

        .step-item.completed {
            border-left-color: #2e7d32;
            opacity: 0.7;
        }

        .phase-divider {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin: 15px 0 5px 0;
            font-weight: bold;
            border-bottom: 1px dashed var(--grid-line);
            padding-bottom: 3px;
        }

        /* Canvas Window */
        #canvas-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: radial-gradient(circle at 20% 20%, #202231 0%, #15161e 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        svg {
            background: rgba(255,255,255,0.01);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* SVG Dynamic Animation Styles */
        .msg-line {
            stroke: var(--accent-orange);
            stroke-width: 3;
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            fill: none;
            transition: stroke-dashoffset 0.6s ease-in-out;
        }

        .msg-arrow {
            fill: var(--accent-orange);
            opacity: 0;
            transition: opacity 0.2s ease 0.4s;
        }

        .msg-text {
            fill: #fff;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease 0.3s;
        }

        .msg-badge {
            fill: #000;
            stroke: var(--accent-orange);
            stroke-width: 1.5;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .badge-text {
            fill: #fff;
            font-size: 11px;
            font-weight: bold;
            text-anchor: middle;
            dominant-baseline: central;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Active Phase Box Overlay animation */
        .phase-box {
            stroke-width: 1.5;
            stroke-dasharray: 6;
            transition: all 0.5s ease;
        }

        /* Executing trigger mechanics */
        .visible .msg-line { stroke-dashoffset: 0; }
        .visible .msg-arrow { opacity: 1; }
        .visible .msg-text { opacity: 1; }
        .visible .msg-badge { opacity: 1; }
        .visible .badge-text { opacity: 1; }

        /* Lifeline pulsing if active node */
        .active-lifeline {
            filter: drop-shadow(0px 0px 8px var(--accent-blue));
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="panel-header">
            <h1>Interactive Flow Engine</h1>
            <small style="color: #718096;">Sequential Execution Engine</small>
        </div>
        
        <div class="controls">
            <button id="prevBtn">◀ Prev</button>
            <button id="playBtn">Play ▶</button>
            <button id="nextBtn">Next ▶</button>
            <button id="resetBtn">Reset</button>
        </div>

        <ul class="step-list" id="stepList">
            </ul>
    </div>

    <div id="canvas-container">
        <svg id="diagramStage" width="1200" height="1550">
            <defs>
                <linearGradient id="actorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2a2d42" />
                    <stop offset="100%" stop-color="#181a26" />
                </linearGradient>
            </defs>

            <g id="phaseBoxes"></g>

            <g id="lifelines">
                <g id="actor-1">
                    <line x1="150" y1="80" x2="150" y2="1500" stroke="#4a5568" stroke-width="2" stroke-dasharray="4"/>
                    <rect x="50" y="25" width="200" height="55" rx="8" fill="url(#actorGrad)" stroke="#008AD2" stroke-width="2"/>
                    <text x="150" y="58" fill="#fff" font-weight="bold" text-anchor="middle">Client / End Client</text>
                </g>
                <g id="actor-2">
                    <line x1="400" y1="80" x2="400" y2="1500" stroke="#4a5568" stroke-width="2" stroke-dasharray="4"/>
                    <rect x="300" y="25" width="200" height="55" rx="8" fill="url(#actorGrad)" stroke="#008AD2" stroke-width="2"/>
                    <text x="400" y="58" fill="#fff" font-weight="bold" text-anchor="middle">Project Management (PM)</text>
                </g>
                <g id="actor-3">
                    <line x1="650" y1="80" x2="650" y2="1500" stroke="#4a5568" stroke-width="2" stroke-dasharray="4"/>
                    <rect x="550" y="25" width="200" height="55" rx="8" fill="url(#actorGrad)" stroke="#008AD2" stroke-width="2"/>
                    <text x="650" y="58" fill="#fff" font-weight="bold" text-anchor="middle">DTP Team</text>
                </g>
                <g id="actor-4">
                    <line x1="900" y1="80" x2="900" y2="1500" stroke="#4a5568" stroke-width="2" stroke-dasharray="4"/>
                    <rect x="800" y="25" width="200" height="55" rx="8" fill="url(#actorGrad)" stroke="#008AD2" stroke-width="2"/>
                    <text x="900" y="58" fill="#fff" font-weight="bold" text-anchor="middle">Internal QA / LSO</text>
                </g>
                <g id="actor-5">
                    <line x1="1120" y1="80" x2="1120" y2="1500" stroke="#4a5568" stroke-width="2" stroke-dasharray="4"/>
                    <rect x="1020" y="25" width="200" height="55" rx="8" fill="url(#actorGrad)" stroke="#008AD2" stroke-width="2"/>
                    <text x="1120" y="58" fill="#fff" font-weight="bold" text-anchor="middle">Accounts & Finance</text>
                </g>
            </g>

            <g id="messageStage"></g>
        </svg>
    </div>

    <script>
        // Parsed Data Model explicitly aligning with your Draw.io schema
        const phaseBlocks = [
            { id: "p1", name: "Project Initiation & Prep", top: 100, bottom: 440, fill: "rgba(0, 138, 212, 0.03)", stroke: "rgba(0, 138, 212, 0.2)" },
            { id: "p2", name: "First Production & Verification Loop", top: 460, bottom: 790, fill: "rgba(243, 146, 0, 0.03)", stroke: "rgba(243, 146, 0, 0.2)" },
            { id: "p3", name: "Final Approvals Loop", top: 810, bottom: 1090, fill: "rgba(0, 138, 212, 0.03)", stroke: "rgba(0, 138, 212, 0.2)" },
            { id: "p4", name: "Project Closure & Billing", top: 1110, bottom: 1440, fill: "rgba(46, 125, 50, 0.03)", stroke: "rgba(46, 125, 50, 0.2)" }
        ];

        const pipelineSteps = [
            // Phase 1 Tasks
            { seq: 1, phase: "p1", from: 150, to: 400, y: 140, type: "call", text: "Project Initiated (via Email/FTP/WeTransfer)" },
            { seq: 2, phase: "p1", from: 400, to: 400, y: 200, type: "self", text: "Run Pre-Flight Checks" },
            { seq: 3, phase: "p1", from: 400, to: 150, y: 260, type: "call", text: "Send Quote" },
            { seq: 4, phase: "p1", from: 150, to: 400, y: 320, type: "call", text: "Issue Preliminary PO" },
            { seq: 5, phase: "p1", from: 400, to: 400, y: 380, type: "self", text: "Allocation to Team Leaders" },
            
            // Phase 2 Tasks
            { seq: 6, phase: "p2", from: 400, to: 650, y: 500, type: "call", text: "Assign to DTP 1" },
            { seq: 7, phase: "p2", from: 650, to: 900, y: 560, type: "call", text: "Send to Internal QA" },
            { seq: 8, phase: "p2", from: 900, to: 150, y: 620, type: "call", text: "Deliver PDF for QA / Language Sign-Off (LSO)" },
            { seq: 9, phase: "p2", from: 150, to: 650, y: 680, type: "call", text: "Feedback / Edits for DTP 2" },
            { seq: 10, phase: "p2", from: 650, to: 150, y: 740, type: "call", text: "Deliver for Client Review (CR)" },

            // Phase 3 Tasks
            { seq: 11, phase: "p3", from: 150, to: 650, y: 850, type: "call", text: "Send CR Feedback for DTP 3" },
            { seq: 12, phase: "p3", from: 650, to: 150, y: 910, type: "call", text: "Deliver for Client's Client Review (CCR)" },
            { seq: 13, phase: "p3", from: 150, to: 650, y: 970, type: "call", text: "Send CCR Feedback for DTP 4" },
            { seq: 14, phase: "p3", from: 150, to: 400, y: 1030, type: "call", text: "Final Approval Granted" },
            { seq: 15, phase: "p3", from: 400, to: 150, y: 1060, type: "call", text: "Final Delivery to Client" },

            // Phase 4 Tasks
            { seq: 16, phase: "p4", from: 400, to: 1120, y: 1160, type: "call", text: "Financial Closure of the Project" },
            { seq: 17, phase: "p4", from: 150, to: 1120, y: 1220, type: "call", text: "Provide Final Purchase Order (PO)" },
            { seq: 18, phase: "p4", from: 150, to: 400, y: 1280, type: "call", text: "Project Feedback" },
            { seq: 19, phase: "p4", from: 1120, to: 150, y: 1340, type: "call", text: "Send Invoicing" },
            { seq: 20, phase: "p4", from: 400, to: 400, y: 1400, type: "self", text: "Project Archived" }
        ];

        let currentExecutionIndex = -1; 
        let playbackInterval = null;
        const animationSpeed = 1200; // milliseconds per transition block

        // Initialization Pipeline
        window.addEventListener('DOMContentLoaded', () => {
            renderStructurePhases();
            renderVectorMessages();
            buildSidebarControlElements();
            updateUIVisuals();
        });

        function renderStructurePhases() {
            const container = document.getElementById('phaseBoxes');
            phaseBlocks.forEach(p => {
                container.innerHTML += `
                    <g id="box-${p.id}">
                        <rect x="25" y="${p.top}" width="1140" height="${p.bottom - p.top}" fill="${p.fill}" stroke="${p.stroke}" class="phase-box" rx="6"/>
                        <text x="35" y="${p.top + 20}" fill="#a0aec0" font-size="11" font-weight="bold" letter-spacing="0.5">${p.name.toUpperCase()}</text>
                    </g>
                `;
            });
        }

        function renderVectorMessages() {
            const stage = document.getElementById('messageStage');
            pipelineSteps.forEach((step, idx) => {
                let renderingMarkup = '';
                const textX = step.type === 'self' ? step.from + 55 : (step.from + step.to) / 2;
                const textAnchor = step.type === 'self' ? 'start' : 'middle';
                const badgeX = step.type === 'self' ? step.from + 40 : (step.from < step.to ? step.from + 20 : step.from - 20);

                if (step.type === 'self') {
                    // Loop Arrow Pathing
                    renderingMarkup = `
                        <path d="M ${step.from} ${step.y} L ${step.from + 40} ${step.y} L ${step.from + 40} ${step.y + 30} L ${step.from + 4} ${step.y + 30}" class="msg-line"/>
                        <polygon points="${step.from+10},${step.y+34} ${step.from},${step.y+30} ${step.from+10},${step.y+26}" class="msg-arrow" />
                    `;
                } else {
                    // Left-to-Right / Right-to-Left Linear Pathing
                    const directionRight = step.from < step.to;
                    const arrowHeadPoints = directionRight 
                        ? `${step.to-10},${step.y-5} ${step.to},${step.y} ${step.to-10},${step.y+5}`
                        : `${step.to+10},${step.y-5} ${step.to},${step.y} ${step.to+10},${step.y+5}`;
                    
                    renderingMarkup = `
                        <line x1="${step.from}" y1="${step.y}" x2="${step.to}" y2="${step.y}" class="msg-line" />
                        <polygon points="${arrowHeadPoints}" class="msg-arrow" />
                    `;
                }

                stage.innerHTML += `
                    <g id="msg-group-${idx}" class="msg-element">
                        ${renderingMarkup}
                        <circle cx="${badgeX}" cy="${step.y}" r="9" class="msg-badge"/>
                        <text x="${badgeX}" y="${step.y}" class="badge-text">${step.seq}</text>
                        <text x="${textX}" y="${step.type === 'self' ? step.y + 18 : step.y - 8}" text-anchor="${textAnchor}" class="msg-text">${step.text}</text>
                    </g>
                `;
            });
        }

        function buildSidebarControlElements() {
            const listContainer = document.getElementById('stepList');
            let lastPhase = '';
            
            pipelineSteps.forEach((s, idx) => {
                if (s.phase !== lastPhase) {
                    const phaseMeta = phaseBlocks.find(p => p.id === s.phase);
                    const divider = document.createElement('li');
                    divider.className = 'phase-divider';
                    divider.innerText = phaseMeta.name;
                    listContainer.appendChild(divider);
                    lastPhase = s.phase;
                }
                
                const item = document.createElement('li');
                item.className = 'step-item';
                item.id = `step-item-${idx}`;
                item.innerHTML = `<strong>${s.seq}.</strong> ${s.text}`;
                item.addEventListener('click', () => jumpToStepIndex(idx));
                listContainer.appendChild(item);
            });
        }

        // Logic Controls Matrix
        function updateUIVisuals() {
            pipelineSteps.forEach((_, idx) => {
                const svgNode = document.getElementById(`msg-group-${idx}`);
                const listNode = document.getElementById(`step-item-${idx}`);
                
                if (idx <= currentExecutionIndex) {
                    svgNode.classList.add('visible');
                    if (listNode) {
                        listNode.className = 'step-item completed';
                        if (idx === currentExecutionIndex) listNode.classList.add('active');
                    }
                } else {
                    svgNode.classList.remove('visible');
                    if (listNode) listNode.className = 'step-item';
                }
            });

            // Focus View Scrolling Hook
            if (currentExecutionIndex >= 0) {
                const currentStep = pipelineSteps[currentExecutionIndex];
                document.getElementById('canvas-container').scrollTo({
                    top: currentStep.y - 200,
                    behavior: 'smooth'
                });
                const activeItem = document.getElementById(`step-item-${currentExecutionIndex}`);
                if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        function jumpToStepIndex(idx) {
            pauseEngine();
            currentExecutionIndex = idx;
            updateUIVisuals();
        }

        function stepForward() {
            if (currentExecutionIndex < pipelineSteps.length - 1) {
                currentExecutionIndex++;
                updateUIVisuals();
            } else {
                pauseEngine();
            }
        }

        function stepBackward() {
            if (currentExecutionIndex >= 0) {
                currentExecutionIndex--;
                updateUIVisuals();
            }
        }

        function playEngine() {
            if (currentExecutionIndex === pipelineSteps.length - 1) currentExecutionIndex = -1;
            document.getElementById('playBtn').innerText = "Pause █";
            stepForward();
            playbackInterval = setInterval(stepForward, animationSpeed);
        }

        function pauseEngine() {
            clearInterval(playbackInterval);
            playbackInterval = null;
            document.getElementById('playBtn').innerText = "Play ▶";
        }

        // Action Bindings
        document.getElementById('playBtn').addEventListener('click', () => {
            if (playbackInterval) pauseEngine(); else playEngine();
        });
        document.getElementById('nextBtn').addEventListener('click', () => { pauseEngine(); stepForward(); });
        document.getElementById('prevBtn').addEventListener('click', () => { pauseEngine(); stepBackward(); });
        document.getElementById('resetBtn').addEventListener('click', () => {
            pauseEngine();
            currentExecutionIndex = -1;
            updateUIVisuals();
            document.getElementById('canvas-container').scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
